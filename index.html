<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CharacteurBuilder v1.5</title>
    <style>
        :root {
            --bg: #1e1e1e;
            --panel: #2b2b2b;
            --text: #d4d4d4;
            --accent: #007acc;
            --ai-color: #8e44ad;
            --border: #3c3c3c;
            --input-bg: #333;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Layout */
        .sidebar { width: 600px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; }
        .main { flex: 1; display: flex; flex-direction: column; background: #e5e5e5; color: #222; }
        
        .toolbar { padding: 15px; background: #333; border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: center; }
        .scroll-area { flex: 1; overflow-y: auto; padding: 25px; padding-bottom: 100px; }
        
        /* Formulaire */
        h2 { border-left: 4px solid var(--accent); padding-left: 12px; font-size: 0.9rem; margin: 35px 0 15px 0; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
        .field-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.75rem; margin-bottom: 6px; color: #aaa; font-weight: bold; }
        
        /* Input + Button AI combo */
        .input-row { display: flex; gap: 5px; align-items: flex-start; }
        input, textarea { flex: 1; background: var(--input-bg); border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 4px; font-family: inherit; font-size: 0.95rem; }
        textarea { height: 70px; resize: vertical; }
        
        .btn-mini-ai { background: transparent; border: 1px solid var(--ai-color); color: var(--ai-color); padding: 5px 8px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; transition: 0.2s; height: 35px; }
        .btn-mini-ai:hover { background: var(--ai-color); color: white; }

        /* Preview Document */
        .preview-header { background: #fff; padding: 10px 25px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        #structure-view { flex: 1; overflow-y: auto; padding: 50px; line-height: 1.8; font-family: 'Georgia', serif; max-width: 700px; margin: 0 auto; background: white; box-shadow: 0 0 15px rgba(0,0,0,0.1); color: #333; }
        
        h1 { color: #000; border-bottom: 3px solid #000; padding-bottom: 5px; margin-top: 50px; font-size: 1.5rem; text-transform: uppercase; }
        h3 { color: var(--accent); border-bottom: 1px solid #eee; margin-top: 30px; font-size: 1.1rem; font-style: italic; }
        .tag-missing { background: #fff3cd; color: #856404; padding: 2px 5px; border-radius: 3px; font-style: italic; font-size: 0.8rem; border: 1px dashed #e6dbb9; }
        b { color: #000; font-weight: 800; }

        /* Boutons principaux */
        button.primary { border: none; padding: 10px 18px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.85rem; transition: 0.2s; }
        .btn-save { background: #28a745; color: white; }
        .btn-load { background: #6c757d; color: white; }
        .btn-ai-global { background: var(--ai-color); color: white; }
        .btn-copy { background: var(--accent); color: white; }
        button:hover { opacity: 0.9; }
        
        #global-loading { display: none; margin-left: 10px; font-size: 0.8rem; color: var(--ai-color); font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="toolbar">
            <button class="primary btn-save" onclick="saveData()">Sauvegarder</button>
            <button class="primary btn-load" onclick="document.getElementById('fileInput').click()">Charger</button>
            <input type="file" id="fileInput" style="display:none" onchange="loadData(event)">
            <button class="primary btn-ai-global" id="btnGlobal" onclick="askAIGlobal()">✨ Remplissage Global</button>
            <span id="global-loading">IA en cours...</span>
        </div>
        
        <div class="scroll-area">
            <div style="font-size: 0.65rem; margin-bottom: 20px; opacity: 0.5;">
                API Google : <input type="password" id="apiKey" value="AIzaSyCsV-7MbL2a9uCriK-y9fF61c3hBrxV1Ts" style="width:150px; height:15px; border:none; background:transparent; color:#fff;">
            </div>

            <h2>1. Identité & Passé</h2>
            <div class="field-group">
                <label>Nom du Personnage</label>
                <div class="input-row">
                    <input type="text" data-key="nom" oninput="updatePreview()" placeholder="Nom...">
                    <button class="btn-mini-ai" onclick="askAIField('nom')">✨</button>
                </div>
            </div>
            <div class="field-group">
                <label>Passé (Bio synthétique)</label>
                <div class="input-row">
                    <textarea data-key="bio" oninput="updatePreview()"></textarea>
                    <button class="btn-mini-ai" onclick="askAIField('bio')">✨</button>
                </div>
            </div>
            <div class="field-group">
                <label>Habitat</label>
                <div class="input-row">
                    <textarea data-key="habitat" oninput="updatePreview()"></textarea>
                    <button class="btn-mini-ai" onclick="askAIField('habitat')">✨</button>
                </div>
            </div>
            <div class="field-group">
                <label>Activité / Métier</label>
                <div class="input-row">
                    <input type="text" data-key="metier" oninput="updatePreview()">
                    <button class="btn-mini-ai" onclick="askAIField('metier')">✨</button>
                </div>
            </div>

            <h2>2. Singularités</h2>
            <div class="field-group">
                <label>Manies / TOC</label>
                <div class="input-row">
                    <textarea data-key="manies" oninput="updatePreview()"></textarea>
                    <button class="btn-mini-ai" onclick="askAIField('manies')">✨</button>
                </div>
            </div>
            <div class="field-group">
                <label>Moment de vulnérabilité</label>
                <div class="input-row">
                    <textarea data-key="vulnerabilite" oninput="updatePreview()"></textarea>
                    <button class="btn-mini-ai" onclick="askAIField('vulnerabilite')">✨</button>
                </div>
            </div>

            <h2>3. Moteur Psychologique</h2>
            <div class="field-group">
                <label>Traumatisme / Blessure</label>
                <div class="input-row">
                    <textarea data-key="trauma" oninput="updatePreview()"></textarea>
                    <button class="btn-mini-ai" onclick="askAIField('trauma')">✨</button>
                </div>
            </div>
            <div class="field-group">
                <label>Besoin inconscient</label>
                <div class="input-row">
                    <textarea data-key="besoin" oninput="updatePreview()"></textarea>
                    <button class="btn-mini-ai" onclick="askAIField('besoin')">✨</button>
                </div>
            </div>
            <div class="field-group">
                <label>Illusion & Crédo</label>
                <div class="input-row">
                    <textarea data-key="illusion" oninput="updatePreview()" placeholder="L'illusion..."></textarea>
                    <button class="btn-mini-ai" onclick="askAIField('illusion')">✨</button>
                </div>
                <input type="text" data-key="credo" oninput="updatePreview()" placeholder="Le crédo (proverbe)..." style="margin-top:5px;">
            </div>

            <h2>4. Arc & Évolution</h2>
            <div class="field-group">
                <label>Révélation</label>
                <div class="input-row">
                    <textarea data-key="revelation" oninput="updatePreview()"></textarea>
                    <button class="btn-mini-ai" onclick="askAIField('revelation')">✨</button>
                </div>
            </div>
            <div class="field-group">
                <label>Renoncement (Richesse à sacrifier)</label>
                <div class="input-row">
                    <textarea data-key="renoncement" oninput="updatePreview()"></textarea>
                    <button class="btn-mini-ai" onclick="askAIField('renoncement')">✨</button>
                </div>
            </div>
            <div class="field-group"><label>Évolution : DÉBUT</label><textarea data-key="evo_debut" oninput="updatePreview()"></textarea></div>
            <div class="field-group"><label>Évolution : MILIEU</label><textarea data-key="evo_milieu" oninput="updatePreview()"></textarea></div>
            <div class="field-group"><label>Évolution : FIN</label><textarea data-key="evo_fin" oninput="updatePreview()"></textarea></div>
        </div>
    </div>

    <div class="main">
        <div class="preview-header">
            <span style="font-weight: bold; color: #888;">PREVIEW STRUCTURELLE</span>
            <button class="primary btn-copy" onclick="copyForScrivener()">Copier pour Scrivener</button>
        </div>
        <div id="structure-view"></div>
    </div>

    <script>
        const structureTemplate = `
            <h1>ACTE 1 — EXPOSITION</h1>
            <p><strong>Ouverture :</strong> Le récit s'ancre dans le trauma de <b>[nom]</b> : [trauma].</p>
            <p><strong>Stase :</strong> <b>[nom]</b> évolue dans son univers ([habitat]) en tant que [metier]. Ses manies ([manies]) trahissent son refus de changer.</p>
            <p><strong>Thèse :</strong> Il vit sous l'illusion suivante : [illusion]. Son crédo est "<b>[credo]</b>".</p>
            <p><strong>Évolution (Début) :</strong> [evo_debut]</p>

            <h1>ACTE 2 — MISE À L'ÉPREUVE</h1>
            <p>Le protagoniste est confronté au monde. Il refuse de sacrifier <b>[renoncement]</b>.</p>
            <p><strong>Évolution (Milieu) :</strong> [evo_milieu]</p>

            <h1>ACTE 3 — ÉTINCELLE DANS LA NUIT</h1>
            <p>Tout s'effondre. Au plus bas de sa trajectoire, dans un moment de vulnérabilité totale ([vulnerabilite]), <b>[nom]</b> accède à la révélation : [revelation]. Il comprend qu'il doit agir selon son besoin de [besoin].</p>

            <h1>ACTE 4 — RÉSOLUTION</h1>
            <p><b>[nom]</b> fait le choix de sacrifier <b>[renoncement]</b>. L'illusion est dissipée.</p>
            <p><strong>Évolution (Fin) :</strong> [evo_fin]</p>
        `;

        function updatePreview() {
            let content = structureTemplate;
            document.querySelectorAll('[data-key]').forEach(input => {
                const key = input.getAttribute('data-key');
                const val = input.value.trim() !== "" ? `<b>${input.value}</b>` : `<span class="tag-missing">[${key.toUpperCase()}]</span>`;
                content = content.replace(new RegExp(`\\[${key}\\]`, 'g'), val);
            });
            document.getElementById('structure-view').innerHTML = content;
        }

        // --- FONCTIONS IA ---
        async function callAI(prompt) {
            const apiKey = document.getElementById('apiKey').value;
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const result = await response.json();
            if (result.error) throw new Error(result.error.message);
            return result.candidates[0].content.parts[0].text;
        }

        async function askAIField(key) {
            const el = document.querySelector(`[data-key="${key}"]`);
            const context = {};
            document.querySelectorAll('[data-key]').forEach(i => { if(i.value) context[i.dataset.key] = i.value; });

            el.value = "Réflexion...";
            try {
                const prompt = `Tu es un expert en scénario. Voici le contexte du personnage : ${JSON.stringify(context)}. 
                Propose une idée originale et percutante pour le champ "${key}". Réponds uniquement par la suggestion, sans commentaire.`;
                const suggestion = await callAI(prompt);
                el.value = suggestion.trim();
                updatePreview();
            } catch (e) { alert("Erreur IA: " + e.message); el.value = ""; }
        }

        async function askAIGlobal() {
            const btn = document.getElementById('btnGlobal');
            const loader = document.getElementById('global-loading');
            const emptyKeys = [];
            const context = {};
            
            document.querySelectorAll('[data-key]').forEach(i => {
                if(!i.value.trim()) emptyKeys.push(i.dataset.key);
                else context[i.dataset.key] = i.value;
            });

            if(emptyKeys.length === 0) return alert("Tout est rempli !");
            
            btn.disabled = true; loader.style.display = "inline";

            try {
                const prompt = `Voici un personnage : ${JSON.stringify(context)}. 
                Remplis les champs suivants avec des idées originales : ${emptyKeys.join(', ')}. 
                Réponds EXCLUSIVEMENT en JSON pur : {"clé": "idée"}`;
                const response = await callAI(prompt);
                const jsonMatch = response.match(/\{[\s\S]*\}/);
                if (jsonMatch) {
                    const suggestions = JSON.parse(jsonMatch[0]);
                    for (let k in suggestions) {
                        const input = document.querySelector(`[data-key="${k}"]`);
                        if(input && !input.value) input.value = suggestions[k];
                    }
                }
                updatePreview();
            } catch (e) { alert("Erreur Global: " + e.message); }
            finally { btn.disabled = false; loader.style.display = "none"; }
        }

        // --- FICHIERS & COPIE ---
        function saveData() {
            const data = {};
            document.querySelectorAll('[data-key]').forEach(i => data[i.dataset.key] = i.value);
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `Character_${data.nom || 'SansNom'}.json`;
            a.click();
        }

        function loadData(event) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = JSON.parse(e.target.result);
                for(let key in data) {
                    const el = document.querySelector(`[data-key="${key}"]`);
                    if(el) el.value = data[key];
                }
                updatePreview();
            };
            reader.readAsText(event.target.files[0]);
        }

        function copyForScrivener() {
            const range = document.createRange();
            range.selectNode(document.getElementById('structure-view'));
            window.getSelection().removeAllRanges();
            window.getSelection().addRange(range);
            document.execCommand('copy');
            alert("Copié !");
        }

        updatePreview();
    </script>
</body>
</html>
